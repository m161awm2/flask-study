<!DOCTYPE html>
<head>

</head>
<body>
    <form method="POST" action="/" >
        <input type="text" name="nickname" placeholder="닉네임" required>
        <input type="text" name="title" placeholder="제목" required>
        <textarea type="text" name="quest" placeholder="문제" required></textarea>
        <input type="text" name="answer" placeholder="정답" required>
        <button type="submit">등록</button>
        {{ not_answer }}
    </form>
    <hr>
    {% for post in posts %}
        <div>
            <a href="/quests/{{ post[0] }}">{{ post[2] }}</a>
            <small>{{ post[1] }}</small>
        </div>
        <hr>
    {% endfor %}
</body>
</html>
