<!DOCTYPE html>
<html lang="ko">
</html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask 11</title>
</head>
<body>
    <h1>투두 리스트</h1>
    <form action="/" method="POST">
        <input type="text" name="title" placeholder="할 일 제목">
        <input type="text" name="contents" placeholder="할 일 설명">
        <button type="submit">추가</button>
    </form>
    {% for post in posts %}
        <div>
            <h2>{{ post[1]  }}</h2>
            <p>{{ post[2] }}</p>
        </div>
    {% endfor %}
